<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-layer"></div>
    <div class="particles" id="particles"></div>
    <div class="energy-rings">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
    </div>
    <div class="overlay"></div>

    <div class="container">
        <div class="glass-panel">
            <h1 class="title">&#x267B; Stopwatch &#x267B;</h1>
            <div class="timer-display" id="timer">00:00:00</div>
            <div class="status" id="status">Ready</div>

            <div class="controls">
                <button id="btnStart" class="btn btn-primary" onclick="sendMessage('start')">Start</button>
                <button id="btnPause" class="btn btn-warning" onclick="sendMessage('pause')" disabled>Pause</button>
                <button id="btnResume" class="btn btn-success" onclick="sendMessage('resume')" disabled>Resume</button>
                <button id="btnReset" class="btn btn-info" onclick="sendMessage('reset')" disabled>Reset</button>
                <button id="btnStop" class="btn btn-danger" onclick="sendMessage('stop')" disabled>Stop</button>
            </div>
        </div>
    </div>

    <script>
        function sendMessage(action) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(action);
            }
        }

        window.chrome.webview.addEventListener('message', event => {
            const data = event.data;
            if (data.type === 'updateDisplay') {
                document.getElementById('timer').innerText = data.time;
            } else if (data.type === 'updateStatus') {
                document.getElementById('status').innerText = data.status;
            } else if (data.type === 'updateButtons') {
                updateButtonStates(data.running, data.paused);
            }
        });

        function updateButtonStates(running, paused) {
            const btnStart = document.getElementById('btnStart');
            const btnPause = document.getElementById('btnPause');
            const btnResume = document.getElementById('btnResume');
            const btnReset = document.getElementById('btnReset');
            const btnStop = document.getElementById('btnStop');
            const timer = document.getElementById('timer');

            if (running && !paused) {
                timer.classList.add('running');
            } else {
                timer.classList.remove('running');
            }

            if (running) {
                btnStart.disabled = true;
                btnPause.disabled = paused;
                btnResume.disabled = !paused;
                btnReset.disabled = false;
                btnStop.disabled = false;
            } else {
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnResume.disabled = true;
                btnReset.disabled = true;
                btnStop.disabled = true;
            }
        }

        (function spawnParticles() {
            const container = document.getElementById('particles');
            const colors = ['#7b2ff7', '#ff2d6b', '#00e1ff', '#b026ff', '#ff6b2d'];
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('span');
                const size = Math.random() * 6 + 2;
                p.style.cssText = `
                    position:absolute;
                    width:${size}px;height:${size}px;
                    background:${colors[Math.floor(Math.random()*colors.length)]};
                    border-radius:50%;
                    left:${Math.random()*100}%;
                    top:${Math.random()*100}%;
                    opacity:${Math.random()*0.7+0.2};
                    animation:floatUp ${Math.random()*8+6}s linear infinite;
                    animation-delay:${Math.random()*6}s;
                    filter:blur(${Math.random()*1.5}px);
                    box-shadow:0 0 ${size*3}px ${colors[Math.floor(Math.random()*colors.length)]};
                `;
                container.appendChild(p);
            }
        })();
    </script>
</body>

</html>
